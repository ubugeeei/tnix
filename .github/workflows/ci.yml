name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install workspace dependencies
        run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile

      - name: Prime the Cabal package index
        run: nix develop --accept-flake-config --command cabal update

      - name: Validate release metadata
        run: nix develop --accept-flake-config --command vp run check:versions

      - name: Build the monorepo
        run: nix develop --accept-flake-config --command vp run build

      - name: Build flake packages
        run: nix build .#tnix .#tnix-lsp

      - name: Smoke test built binaries
        run: |
          ./result/bin/tnix --version
          ./result-1/bin/tnix-lsp --version

      - name: Package the VS Code extension
        run: nix develop --accept-flake-config --command bash -lc 'pnpm --filter tnix build && pnpm --filter tnix exec vsce package --no-dependencies --out /tmp/tnix-ci.vsix'

      - name: Run the full verification suite
        run: nix develop --accept-flake-config --command vp run check
