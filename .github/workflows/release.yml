name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-assets:
    name: Build Release Assets (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            archive: tnix-${{ github.ref_name }}-linux-x64.tar.gz
            sha: tnix-${{ github.ref_name }}-linux-x64.sha256
          - os: macos-latest
            label: macos-arm64
            archive: tnix-${{ github.ref_name }}-macos-arm64.tar.gz
            sha: tnix-${{ github.ref_name }}-macos-arm64.sha256
    steps:
      - name: Check out sources
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install workspace dependencies
        run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile

      - name: Prime the Cabal package index
        run: nix develop --accept-flake-config --command cabal update

      - name: Build release binaries
        run: nix develop --accept-flake-config --command bash ./scripts/package-release.sh "${{ github.ref_name }}" "${{ matrix.label }}" "${{ matrix.archive }}" "${{ matrix.sha }}"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            ./${{ matrix.archive }}
            ./${{ matrix.sha }}

  build-vscode-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install workspace dependencies
        run: nix develop --accept-flake-config --command pnpm install --frozen-lockfile

      - name: Package VS Code extension
        run: nix develop --accept-flake-config --command bash -lc 'pnpm --filter tnix build && pnpm --filter tnix exec vsce package --no-dependencies --out ../../tnix-vscode-${{ github.ref_name }}.vsix'

      - name: Upload VS Code extension
        uses: actions/upload-artifact@v4
        with:
          name: release-vscode
          path: ./tnix-vscode-${{ github.ref_name }}.vsix

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-assets
      - build-vscode-extension
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
